plugin.extra_agree_check.admin.auto_insert.description: |
如果您自定義了模板或使用自己的模板，自動插入可能不正常。
在這種情況下，請取消選中框並編輯“非會員購買信息輸入”或“聯繫（輸入頁面）”模板，然後插入片段。
請參考以下插入片段。
plugin.extra_agree_check.admin.auto_insert.index_snippet: |
<div class="ec-checkbox{{ has_errors(form.user_policy_check) ? ' error' }}">
<label>
{{ form_widget(form.user_policy_check) }}
<a class="ec-link" href="%url%" target="_blank">同意使用條款</a>
</label>
{{ form_errors(form.user_policy_check) }}
</div>
plugin.extra_agree_check.admin.auto_insert.confirm_description: |
如果要在聯繫表單中插入片段，請在“聯繫（確認頁面）”模板中插入以下片段。
